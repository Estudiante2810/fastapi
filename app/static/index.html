<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detección de Marcas CMYK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .section {
            display: flex;
            flex-direction: column;
        }

        .section h2 {
            font-size: 18px;
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            display: block;
            margin-bottom: 15px;
        }

        canvas {
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #efefef;
        }

        .btn-secondary:disabled {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
        }

        .btn-danger:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .captured-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }

        .captured-image.show {
            display: block;
        }

        .results {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .results h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .channel-result {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 4px solid #667eea;
        }

        .channel-result.detected {
            border-left-color: #51cf66;
        }

        .channel-result.not-detected {
            border-left-color: #ffa8a8;
        }

        .channel-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .channel-details {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-badge.detected {
            background: #d3f9d8;
            color: #2f9e44;
        }

        .status-badge.not-detected {
            background: #ffe0e0;
            color: #c92a2a;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ffe0e0;
            color: #c92a2a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #d3f9d8;
            color: #2f9e44;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .info-box {
            background: #e7f5ff;
            border-left: 4px solid #4dabf7;
            padding: 15px;
            border-radius: 8px;
            color: #1971c2;
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .lightbox-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lightbox-overlay.show {
            display: flex;
        }

        .lightbox-overlay img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 36px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
            user-select: none;
        }

        .lightbox-close:hover {
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1 style="margin-bottom: 0;">Detección de Marcas CMYK</h1>
                <button class="btn-secondary" id="viewHistoryBtn" style="flex: none; padding: 10px 16px;">Ver resultados pasados</button>
        </div>

        <div id="mainView">
        <div class="main-content">
            <div class="section">
                <h2>Cámara en Vivo</h2>
                <video id="video" autoplay playsinline></video>
                <div class="controls">
                    <button class="btn-primary" id="captureBtn">Capturar Foto</button>
                    <button class="btn-secondary" id="toggleCameraBtn">Iniciar Cámara</button>
                </div>
                <div class="error" id="cameraError"></div>
            </div>

            <div class="section">
                <h2>Foto Capturada</h2>
                <img id="capturedImage" class="captured-image" alt="Foto capturada">
                <div class="controls">
                    <button class="btn-primary" id="analyzeBtn" disabled>Analizar Imagen</button>
                    <button class="btn-secondary" id="clearBtn" disabled>Limpiar</button>
                </div>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analizando imagen...</p>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <div class="results" id="results" style="display: none;">
            <h3>Resultados del Análisis</h3>
            <div id="resultsGallery" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px;"></div>
            <div id="resultsContent"></div>
        </div>
        </div>
        <div id="historyView" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: #667eea; border-bottom: 2px solid #667eea; padding-bottom: 10px; flex: 1;">Resultados Pasados</h2>
                <button class="btn-secondary" id="backToMainBtn" style="flex: none; margin-left: 15px;">← Volver</button>
            </div>

            <div class="loading" id="historyLoading" style="display: none;">
                <div class="spinner"></div>
                <p>Cargando resultados...</p>
            </div>

            <div class="error" id="historyError"></div>

            <div id="historyList"></div>

            <!-- Detalle de un análisis seleccionado -->
            <div id="historyDetail" style="display: none; margin-top: 20px;">
                <button class="btn-secondary" id="backToListBtn" style="margin-bottom: 15px;">← Volver a la lista</button>
                <img id="historyDetailImage" style="width: 100%; border-radius: 10px; margin-bottom: 15px;" alt="Imagen del análisis">
                <div id="historyDetailContent"></div>
            </div>
        </div>
    </div>

    <div class="lightbox-overlay" id="lightboxOverlay">
        <span class="lightbox-close" id="lightboxClose">&times;</span>
        <img id="lightboxImage" src="" alt="Imagen ampliada">
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const capturedImage = document.getElementById('capturedImage');
        const toggleCameraBtn = document.getElementById('toggleCameraBtn');
        const captureBtn = document.getElementById('captureBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const success = document.getElementById('success');
        const results = document.getElementById('results');
        const resultsContent = document.getElementById('resultsContent');
        const cameraError = document.getElementById('cameraError');

        let stream = null;
        let isCameraActive = false;
        let capturedImageData = null;

        // Inicializar cámara
        async function initCamera() {
            try {
                cameraError.classList.remove('show');
                cameraError.textContent = '';

                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('Tu navegador no soporta acceso a cámara');
                }

                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: 'user'
                    }
                });

                video.srcObject = stream;
                isCameraActive = true;
                toggleCameraBtn.textContent = 'Detener Cámara';
                toggleCameraBtn.classList.add('btn-danger');
                toggleCameraBtn.classList.remove('btn-secondary');
                captureBtn.disabled = false;
            } catch (err) {
                cameraError.classList.add('show');
                cameraError.textContent = `Error: ${err.message}. Verifica que hayas permitido acceso a la cámara.`;
                console.error('Error al acceder a la cámara:', err);
            }
        }

        // Detener cámara
        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
                isCameraActive = false;
            }
            video.srcObject = null;
            toggleCameraBtn.textContent = 'Iniciar Cámara';
            toggleCameraBtn.classList.remove('btn-danger');
            toggleCameraBtn.classList.add('btn-secondary');
            captureBtn.disabled = true;
        }

        // Toggle cámara
        toggleCameraBtn.addEventListener('click', () => {
            if (isCameraActive) {
                stopCamera();
            } else {
                initCamera();
            }
        });

        // Capturar foto
        captureBtn.addEventListener('click', () => {
            if (!isCameraActive || !video.srcObject) {
                error.classList.add('show');
                error.textContent = 'La cámara no está activa';
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);

            capturedImageData = canvas.toDataURL('image/jpeg', 0.95);
            capturedImage.src = capturedImageData;
            capturedImage.classList.add('show');
            analyzeBtn.disabled = false;
            clearBtn.disabled = false;

            error.classList.remove('show');
            success.classList.remove('show');
            results.style.display = 'none';

            // Analizar automáticamente después de capturar
            setTimeout(() => {
                analyzeImage();
            }, 500);
        });

        // Función para analizar imagen
        async function analyzeImage() {
            if (!capturedImageData) {
                error.classList.add('show');
                error.textContent = 'No hay imagen capturada';
                return;
            }

            try {
                loading.style.display = 'block';
                error.classList.remove('show');
                success.classList.remove('show');
                results.style.display = 'none';

                // Convertir base64 a blob
                const res = await fetch(capturedImageData);
                const blob = await res.blob();

                // Crear FormData
                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');

                // Enviar al backend con camera_distance_mm=25 y todos los canales
                const url = new URL('/api/v1/detection/analyze', window.location.origin);
                url.searchParams.append('camera_distance_mm', '25');
                url.searchParams.append('channels', 'C');
                url.searchParams.append('channels', 'M');
                url.searchParams.append('channels', 'Y');
                url.searchParams.append('save_outputs', 'true');

                const response = await fetch(url.toString(), {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Error en el servidor');
                }

                const data = await response.json();
                displayResults(data);
                success.classList.add('show');
                success.textContent = '✓ Análisis completado exitosamente';
            } catch (err) {
                error.classList.add('show');
                error.textContent = `Error: ${err.message}`;
                console.error('Error:', err);
            } finally {
                loading.style.display = 'none';
            }
        }

        // Analizar imagen manualmente (botón)
        analyzeBtn.addEventListener('click', () => {
            analyzeImage();
        });

        // Limpiar
        clearBtn.addEventListener('click', () => {
            capturedImage.classList.remove('show');
            capturedImageData = null;
            analyzeBtn.disabled = true;
            clearBtn.disabled = true;
            error.classList.remove('show');
            success.classList.remove('show');
            results.style.display = 'none';
        });

        // Mostrar resultados
        async function displayResults(data) {
            resultsContent.innerHTML = '';

            const resultsGallery = document.getElementById('resultsGallery');
            resultsGallery.innerHTML = '';

            // Cargar galería de imágenes guardadas, igual que en el historial
            if (data.id) {
                try {
                    const res = await fetch(`/api/v1/detection/history/${data.id}/images`);
                    if (res.ok) {
                        const imgData = await res.json();
                        imgData.filenames.forEach(filename => {
                            const img = document.createElement('img');
                            img.src = `/api/v1/detection/history/${data.id}/images/${filename}`;
                            img.alt = filename;
                            img.title = filename;
                            img.style.width = '100%';
                            img.style.borderRadius = '8px';
                            img.style.cursor = 'pointer';
                            img.onclick = () => openLightbox(img.src);
                            resultsGallery.appendChild(img);
                        });
                    }
                } catch (err) {
                    console.error('Error cargando imágenes del análisis:', err);
                }
            }

            const channels = ['C', 'M', 'Y', 'K'];
            channels.forEach(channel => {
                const channelData = data[channel];
                if (channelData) {
                    const div = document.createElement('div');
                    div.className = `channel-result ${channelData.detected ? 'detected' : 'not-detected'}`;

                    const status = channelData.detected ? 'Detectado ✓' : 'No detectado';
                    const statusClass = channelData.detected ? 'detected' : 'not-detected';

                    let html = `<div class="channel-name">
                        Canal ${channel}
                        <span class="status-badge ${statusClass}">${status}</span>
                    </div>`;

                    if (channelData.detected && channelData.mark) {
                        html += `<div class="channel-details">
                            <div>Posición X: ${channelData.mark.x} px</div>
                            <div>Posición Y: ${channelData.mark.y} px</div>
                            <div>Confianza: ${(channelData.mark.score * 100).toFixed(2)}%</div>
                            <div>Escala: ${channelData.mark.scale}x</div>
                            <div>Píxeles: ${channelData.pixel_count}</div>
                        </div>`;
                    } else {
                        html += `<div class="channel-details">
                            No se encontraron marcas en este canal
                        </div>`;
                    }

                    div.innerHTML = html;
                    resultsContent.appendChild(div);
                }
            });

            results.style.display = 'block';
        }

        // Auto-iniciar cámara al cargar la página
        window.addEventListener('load', () => {
            // Opcional: descomentar para auto-iniciar
            // initCamera();
        });

        // ============ HISTORIAL ============
        const mainView = document.getElementById('mainView');
        const historyView = document.getElementById('historyView');
        const viewHistoryBtn = document.getElementById('viewHistoryBtn');
        const backToMainBtn = document.getElementById('backToMainBtn');
        const backToListBtn = document.getElementById('backToListBtn');
        const historyLoading = document.getElementById('historyLoading');
        const historyError = document.getElementById('historyError');
        const historyList = document.getElementById('historyList');
        const historyDetail = document.getElementById('historyDetail');
        const historyDetailImage = document.getElementById('historyDetailImage');
        const historyDetailContent = document.getElementById('historyDetailContent');

        viewHistoryBtn.addEventListener('click', () => {
            mainView.style.display = 'none';
            historyView.style.display = 'block';
            loadHistory();
        });

        backToMainBtn.addEventListener('click', () => {
            historyView.style.display = 'none';
            mainView.style.display = 'block';
        });

        backToListBtn.addEventListener('click', () => {
            historyDetail.style.display = 'none';
            historyList.style.display = 'block';
        });

        async function loadHistory() {
            historyError.classList.remove('show');
            historyList.innerHTML = '';
            historyDetail.style.display = 'none';
            historyList.style.display = 'block';
            historyLoading.style.display = 'block';

            try {
                const response = await fetch('/api/v1/detection/history');
                if (!response.ok) throw new Error('No se pudo cargar el historial');
                const records = await response.json();

                if (records.length === 0) {
                    historyList.innerHTML = '<p style="color: #666;">Aún no hay análisis guardados.</p>';
                    return;
                }

                records.forEach(record => {
                    const item = document.createElement('div');
                    item.className = 'channel-result';
                    item.style.cursor = 'pointer';

                    const date = new Date(record.timestamp).toLocaleString('es-DO');
                    const colorCount = record.colors.length;

                    item.innerHTML = `
                        <div class="channel-name">${record.image_filename}</div>
                        <div class="channel-details">
                            <div>Fecha: ${date}</div>
                            <div>Canales detectados: ${colorCount}</div>
                        </div>
                    `;

                    item.addEventListener('click', () => showHistoryDetail(record));
                    historyList.appendChild(item);
                });
            } catch (err) {
                historyError.classList.add('show');
                historyError.textContent = `Error: ${err.message}`;
            } finally {
                historyLoading.style.display = 'none';
            }
        }

        async function showHistoryDetail(record) {
            historyList.style.display = 'none';
            historyDetail.style.display = 'block';

            // Limpiar galería anterior
            historyDetailImage.style.display = 'none';
            const oldGallery = document.getElementById('historyImageGallery');
            if (oldGallery) oldGallery.remove();

            // Crear contenedor de galería
            const gallery = document.createElement('div');
            gallery.id = 'historyImageGallery';
            gallery.style.display = 'grid';
            gallery.style.gridTemplateColumns = 'repeat(auto-fit, minmax(150px, 1fr))';
            gallery.style.gap = '10px';
            gallery.style.marginBottom = '15px';
            historyDetailImage.parentNode.insertBefore(gallery, historyDetailImage);

            try {
                const res = await fetch(`/api/v1/detection/history/${record.id}/images`);
                if (res.ok) {
                    const data = await res.json();
                    data.filenames.forEach(filename => {
                        const img = document.createElement('img');
                        img.src = `/api/v1/detection/history/${record.id}/images/${filename}`;
                        img.alt = filename;
                        img.title = filename;
                        img.style.width = '100%';
                        img.style.borderRadius = '8px';
                        img.style.cursor = 'pointer';
                        img.onclick = () => openLightbox(img.src);
                        gallery.appendChild(img);
                    });
                }
            } catch (err) {
                console.error('Error cargando imágenes:', err);
            }

            let html = `<h3>${record.image_filename}</h3>
                <p style="color: #666; margin-bottom: 15px;">
                    ${new Date(record.timestamp).toLocaleString('es-DO')}
                </p>`;

            record.colors.forEach(c => {
                html += `<div class="channel-result detected">
                    <div class="channel-name">Canal ${c.name}</div>
                    <div class="channel-details">
                        <div>Posición X: ${c.coordinates.x} px</div>
                        <div>Posición Y: ${c.coordinates.y} px</div>
                        <div>Confianza: ${(c.confidence * 100).toFixed(2)}%</div>
                        ${c.extra && c.extra.scale ? `<div>Escala: ${c.extra.scale}x</div>` : ''}
                    </div>
                </div>`;
            });

            if (record.metadata && Object.keys(record.metadata).length > 0) {
                html += `<div class="channel-result">
                    <div class="channel-name">Metadata</div>
                    <div class="channel-details">
                        ${Object.entries(record.metadata).map(([k, v]) => `<div>${k}: ${v}</div>`).join('')}
                    </div>
                </div>`;
            }

            historyDetailContent.innerHTML = html;
        }

        // ============ LIGHTBOX ============
        const lightboxOverlay = document.getElementById('lightboxOverlay');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxClose = document.getElementById('lightboxClose');

        function openLightbox(src) {
            lightboxImage.src = src;
            lightboxOverlay.classList.add('show');
        }

        function closeLightbox() {
            lightboxOverlay.classList.remove('show');
            lightboxImage.src = '';
        }

        lightboxClose.addEventListener('click', closeLightbox);

        // Cerrar al hacer clic fuera de la imagen
        lightboxOverlay.addEventListener('click', (e) => {
            if (e.target === lightboxOverlay) {
                closeLightbox();
            }
        });

        // Cerrar con la tecla Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightboxOverlay.classList.contains('show')) {
                closeLightbox();
            }
        });

    </script>
</body>
</html>
